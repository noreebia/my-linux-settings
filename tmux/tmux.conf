##### ------------------------------------------------------------
##### 1. Prefix key: change from Ctrl-b to Ctrl-s
##### ------------------------------------------------------------

# Unbind the default prefix
unbind C-b

# Set new prefix to Ctrl-s
set -g prefix C-s

# Allow sending the literal prefix to nested tmux sessions
bind C-s send-prefix


##### ------------------------------------------------------------
##### 2. Enable mouse support
##### ------------------------------------------------------------

# Mouse support for selecting panes, resizing, scrolling, etc.
set -g mouse on


##### ------------------------------------------------------------
##### 3. Pane navigation
#####    - prefix + h/j/k/l
#####    - Alt + arrow keys without prefix
##### ------------------------------------------------------------

# -n means "no prefix required"
# -r means keys can repeat while held down
# Vim-style pane navigation without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
# Alt + arrow pane navigation without prefix
bind -rn M-Left  select-pane -L
bind -rn M-Right select-pane -R
bind -rn M-Up    select-pane -U
bind -rn M-Down  select-pane -D


##### ------------------------------------------------------------
##### 4. Reload config quickly
##### ------------------------------------------------------------

# Reload tmux config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"


##### ------------------------------------------------------------
##### 5. Increase scrollback history
##### ------------------------------------------------------------

# Keep a large scrollback buffer
set -g history-limit 100000


##### ------------------------------------------------------------
##### 6. Vi mode in copy mode + optional copy shortcuts
##### ------------------------------------------------------------

# Use vi-style keys in copy mode
setw -g mode-keys vi

# In copy mode:
# - v starts selection
# - y copies selection
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


##### ------------------------------------------------------------
##### 7. Better status bar
##### ------------------------------------------------------------

# Status bar refresh interval
set -g status-interval 5

# Basic colors
set -g status-style "bg=colour234,fg=colour250"

# Left side: session name
set -g status-left-length 30
set -g status-left "#[fg=colour40,bold] #S "

# Right side: hostname + date/time
set -g status-right-length 80
set -g status-right "#[fg=colour245]#H #[fg=colour220]%Y-%m-%d %H:%M "

# Window title styling
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour234,bg=colour39,bold] #I:#W #[default]"


##### ------------------------------------------------------------
##### 8. Start windows and panes numbered at 1
##### ------------------------------------------------------------

# Start numbering windows at 1 instead of 0
set -g base-index 1

# Start numbering panes at 1 instead of 0
setw -g pane-base-index 1

# When creating a new window, keep numbering consistent
set -g renumber-windows on


##### ------------------------------------------------------------
##### 9. Faster escape time
##### ------------------------------------------------------------

# Reduce delay when pressing Escape (helpful for Vim/Neovim)
set -sg escape-time 0


##### ------------------------------------------------------------
##### 10. Easier pane splits
##### ------------------------------------------------------------

# Split vertically with prefix + |
bind | split-window -h

# Split horizontally with prefix + -
bind - split-window -v


##### ------------------------------------------------------------
##### 11. Automatic window renaming
##### ------------------------------------------------------------

# Automatically rename windows based on the active command
set -g automatic-rename on


##### ------------------------------------------------------------
##### 12. True color support
##### ------------------------------------------------------------

# Use a modern terminal definition
set -g default-terminal "tmux-256color"

# Advertise true-color support to applications inside tmux
set -as terminal-features ",*:RGB"


##### ------------------------------------------------------------
##### 13. Faster pane resizing
##### ------------------------------------------------------------

# Resize panes with prefix + Shift-h/j/k/l
# -r allows repeating while key is held
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### ------------------------------------------------------------
##### 14. Activity alerts
##### ------------------------------------------------------------

# Monitor activity in windows
setw -g monitor-activity on

# Visually notify when activity happens
set -g visual-activity on


##### ------------------------------------------------------------
##### 15. Make pane borders visible
##### ------------------------------------------------------------

# Inactive pane border
set -g pane-border-style "fg=colour238"

# Active pane border
set -g pane-active-border-style "fg=colour39"


##### ------------------------------------------------------------
##### Optional quality-of-life extras
##### ------------------------------------------------------------

# Display pane numbers briefly when using display-panes
set -g display-panes-time 1000

# Allow a bit more time for multi-key sequences if needed
# Uncomment if Ctrl-s ever feels too sensitive in your terminal
# set -s repeat-time 300

# Easy toggle with Prefix + e (mnemonic: Echo)
bind e setw synchronize-panes \; display-message "Sync: #{?synchronize-panes,ON,OFF}"

# Add a BIG indicator to your status bar so you don't forget it's on
set -g status-left "#{?pane_synchronized,#[bg=red] SYNC #[default],}[#S] "